<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Upload Large Files</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 0 20px;
        }

        h2 {
            margin-bottom: 12px;
        }

        input[type='file'] {
            display: block;
            margin-bottom: 12px;
        }

        input[type='text'] {
            width: 100%;
            padding: 6px;
            margin-bottom: 12px;
            box-sizing: border-box;
        }

        button {
            padding: 8px 20px;
            cursor: pointer;
        }

        pre {
            background: #f4f4f4;
            padding: 12px;
            margin-top: 16px;
            white-space: pre-wrap;
            word-break: break-all;
        }
    </style>
</head>

<body>
    <h2>Upload Large Files — POST /user/upload/large-file</h2>

    <label>Extra body field (name):</label>
    <input type="text" id="name" placeholder="e.g. my-upload" />

    <label>Select files (up to 20):</label>
    <input type="file" id="files" multiple />

    <button onclick="upload()">Upload</button>

    <pre id="result">Response will appear here...</pre>

    <script>
        async function upload() {
            const files = document.getElementById('files').files;
            const name = document.getElementById('name').value;
            const result = document.getElementById('result');
            const chunkSize = 1 * 1024 * 1024; // 1MB
            const file = files[0];

            if (!files.length) {
                result.textContent = 'Please select at least one file.';
                return;
            }

            const chunks = [];
            let startPos = 0;
            while (startPos < file.size) {
                const endPos = Math.min(startPos + chunkSize, file.size);
                chunks.push(file.slice(startPos, endPos));
                startPos += chunkSize;
            }

            if (!chunks.length) {
                return;
            }

            result.textContent = 'Uploading...';
            try {
                const randomSuffix = Math.random().toString(36).substring(2, 8);
                for (let index = 0; index < chunks.length; index++) {
                    const formData = new FormData();
                    // text fields must come before the file so multer parses them into req.body
                    formData.set('name', `${file.name}-${randomSuffix}}`);
                    formData.append('chunkIndex', String(index));
                    formData.append('totalChunks', String(chunks.length));
                    formData.append('files', chunks[index], file.name);

                    const res = await fetch(
                        'http://localhost:3000/user/upload/large-file',
                        {
                            method: 'POST',
                            body: formData,
                        },
                    );
                    const text = await res.text();
                    result.textContent = `Chunk ${index + 1}/${chunks.length} — Status: ${res.status}\n\n${text}`;
                }
                result.textContent += '\n\nAll chunks uploaded.';
            } catch (err) {
                result.textContent = `Error: ${err.message}`;
            }
        }
    </script>
</body>

</html>
